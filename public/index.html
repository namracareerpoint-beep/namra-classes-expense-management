<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Expense Management System for Namra Classes - Track cash, bank, and online expenses">
  <meta name="theme-color" content="#0B0F19">
  <title>Namra Classes — Expense Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Login Page -->
  <div id="login-page" class="page active">
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-logo">
          <div class="logo-icon">📚</div>
          <h1>Namra Classes</h1>
          <p class="login-subtitle">Expense Manager</p>
        </div>
        <form id="login-form">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" placeholder="Enter username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            <span>Sign In</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Setup Wizard -->
  <div id="setup-page" class="page">
    <div class="setup-wrapper">
      <div class="setup-card">
        <div id="setup-content"></div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app-page" class="page">
    <!-- Mobile Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="header-logo">📚</div>
        <span class="header-title">Namra Classes</span>
      </div>
      <div class="header-right">
        <span class="header-user" id="header-user-name"></span>
        <button class="btn-icon" id="header-menu-btn" title="Menu">☰</button>
      </div>
    </header>

    <!-- Sidebar (Desktop) -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">📚</div>
        <h2>Namra Classes</h2>
        <p class="sidebar-subtitle">Expense Manager</p>
      </div>
      <ul class="sidebar-nav">
        <li><a href="#" class="nav-item active" data-page="dashboard"><span class="nav-icon">🏠</span><span>Dashboard</span></a></li>
        <li><a href="#" class="nav-item" data-page="add"><span class="nav-icon">➕</span><span>Add Entry</span></a></li>
        <li><a href="#" class="nav-item" data-page="transfer"><span class="nav-icon">🔄</span><span>Transfer</span></a></li>
        <li><a href="#" class="nav-item" data-page="transactions"><span class="nav-icon">📋</span><span>History</span></a></li>
        <li><a href="#" class="nav-item" data-page="reminders"><span class="nav-icon">🔔</span><span>Reminders</span></a></li>
        <li><a href="#" class="nav-item" data-page="reports"><span class="nav-icon">📊</span><span>Reports</span></a></li>
        <li class="nav-divider"></li>
        <li class="admin-only"><a href="#" class="nav-item" data-page="settings"><span class="nav-icon">⚙️</span><span>Settings</span></a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebar-user-info"></div>
        <button class="btn btn-outline btn-sm" id="sidebar-logout-btn">🚪 Logout</button>
      </div>
    </nav>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <div id="view-container"></div>
    </main>

    <!-- Bottom Nav (Mobile) -->
    <nav class="bottom-nav" id="bottom-nav">
      <a href="#" class="bottom-nav-item active" data-page="dashboard">
        <span class="bnav-icon">🏠</span><span class="bnav-label">Home</span>
      </a>
      <a href="#" class="bottom-nav-item" data-page="add">
        <span class="bnav-icon">➕</span><span class="bnav-label">Add</span>
      </a>
      <a href="#" class="bottom-nav-item" data-page="transfer">
        <span class="bnav-icon">🔄</span><span class="bnav-label">Transfer</span>
      </a>
      <a href="#" class="bottom-nav-item" data-page="transactions">
        <span class="bnav-icon">📋</span><span class="bnav-label">History</span>
      </a>
      <a href="#" class="bottom-nav-item" data-page="reports">
        <span class="bnav-icon">📊</span><span class="bnav-label">Reports</span>
      </a>
    </nav>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal-card">
      <h3 id="confirm-modal-title">Confirm</h3>
      <p id="confirm-modal-message">Are you sure?</p>
      <div class="modal-actions">
        <button class="btn btn-outline" id="confirm-modal-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/setup.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/expense.js"></script>
  <script src="/js/transfer.js"></script>
  <script src="/js/transactions.js"></script>
  <script src="/js/reminders.js"></script>
  <script src="/js/reports.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
